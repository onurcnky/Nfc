<style>
  :root {
    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2235;
    --line: rgba(255,255,255,0.07);
    --line2: rgba(255,255,255,0.13);
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --ok: #10b981;
    --warn: #f59e0b;
    --err: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }

  /* ── top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: rgba(10,15,30,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.06em; color: var(--text2); }
  .topbar-logo span { color: var(--accent2); }
  .topbar-badge {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border-radius: 999px; background: rgba(59,130,246,0.12);
    color: var(--accent2); border: 1px solid rgba(59,130,246,0.25);
    display: flex; align-items: center; gap: 5px;
  }
  .topbar-badge svg { width: 12px; height: 12px; }

  /* ── hero ── */
  .hero {
    padding: 28px 20px 0;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

  .hero-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .hero-eyebrow::after { content:''; flex:1; height:1px; background: var(--line2); }

  .hero-main { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
  .equip-avatar {
    width: 56px; height: 56px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
    border: 1px solid var(--line2);
  }
  .hero-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; line-height: 1.2; }
  .hero-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .hero-id {
    margin-top: 8px; display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text3); background: var(--bg3);
    padding: 3px 8px; border-radius: 5px; border: 1px solid var(--line);
    font-family: monospace; letter-spacing: 0.05em;
  }

  /* status pills */
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .pill {
    font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 999px;
    display: flex; align-items: center; gap: 5px;
  }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill.ok  { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
  .pill.warn{ background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
  .pill.err { background: rgba(239,68,68,0.1);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .pill.info{ background: rgba(59,130,246,0.1); color: var(--accent2); border: 1px solid rgba(59,130,246,0.2); }
  .pill.ok   .pill-dot { background: #34d399; }
  .pill.warn .pill-dot { background: #fbbf24; }
  .pill.err  .pill-dot { background: #f87171; }
  .pill.info .pill-dot { background: var(--accent2); }

  /* ── stat row ── */
  .stat-row {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    padding: 0 20px 20px;
    animation: fadeUp 0.4s 0.08s ease both;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; color: var(--text); }
  .stat-val.ok   { color: #34d399; }
  .stat-val.warn { color: #fbbf24; }
  .stat-val.err  { color: #f87171; }

  /* ── sections ── */
  .section {
    padding: 0 20px 20px;
    animation: fadeUp 0.4s 0.14s ease both;
  }
  .section-header {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-header::after { content:''; flex:1; height:1px; background: var(--line); }

  .info-card {
    background: var(--bg2); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden;
  }
  .info-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px; border-bottom: 1px solid var(--line); gap: 12px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .info-key svg { opacity: 0.5; flex-shrink: 0; }
  .info-val { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; }
  .info-val.mono { font-family: monospace; letter-spacing: 0.04em; color: var(--accent2); }
  .info-val.warn { color: #fbbf24; }
  .info-val.err  { color: #f87171; }
  .info-val.ok   { color: #34d399; }

  /* ── maintenance timeline ── */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-item {
    display: flex; gap: 12px; padding-bottom: 16px; position: relative;
  }
  .tl-item:not(:last-child)::before {
    content: ''; position: absolute; left: 7px; top: 20px; bottom: 0;
    width: 1px; background: var(--line2);
  }
  .tl-dot {
    width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    border: 2px solid; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .tl-dot.ok   { border-color: var(--ok); }
  .tl-dot.warn { border-color: var(--warn); }
  .tl-dot.err  { border-color: var(--err); }
  .tl-body { flex: 1; min-width: 0; }
  .tl-date { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .tl-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .tl-desc { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
  .tl-type {
    display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px;
    border-radius: 999px; margin-left: 6px; vertical-align: middle;
  }
  .tl-type.periyodik { background: rgba(59,130,246,0.12); color: var(--accent2); }
  .tl-type.ariza     { background: rgba(239,68,68,0.12); color: #f87171; }
  .tl-type.onleyici  { background: rgba(245,158,11,0.12); color: #fbbf24; }

  /* ── action buttons ── */
  .actions {
    padding: 0 20px 32px; display: flex; gap: 10px;
    animation: fadeUp 0.4s 0.2s ease both;
  }
  .btn {
    flex: 1; padding: 14px 10px; border-radius: var(--radius);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 0.03em; cursor: pointer; border: none;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary {
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--line2);
  }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ── next maintenance banner ── */
  .next-banner {
    margin: 0 20px 20px;
    padding: 14px 16px;
    border-radius: var(--radius);
    background: rgba(59,130,246,0.07);
    border: 1px solid rgba(59,130,246,0.2);
    display: flex; align-items: center; gap: 12px;
    animation: fadeUp 0.4s 0.12s ease both;
  }
  .next-banner svg { flex-shrink: 0; color: var(--accent2); width: 20px; height: 20px; }
  .next-banner-label { font-size: 11px; color: var(--text3); }
  .next-banner-date  { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-top: 1px; }
  .next-banner.warn  { background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.25); }
  .next-banner.warn svg { color: #fbbf24; }
  .next-banner.err   { background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.25); }
  .next-banner.err svg { color: #f87171; }

  /* ── not found ── */
  .not-found {
    min-height: 60vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 40px 20px;
  }
  .not-found svg { width: 48px; height: 48px; color: var(--text3); margin-bottom: 16px; }
  .not-found h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .not-found p { font-size: 14px; color: var(--text2); line-height: 1.6; }

  /* ── loading ── */
  .loading {
    min-height: 60vh; display: flex; align-items: center; justify-content: center;
  }
  .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--line2); border-top-color: var(--accent);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

  share:      '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
  next:       '<polyline points="9 18 15 12 9 6"/>',
};

function renderEquipment(eq) {
  const nextClass = eq.nextMaintStatus === 'err' ? 'err' : eq.nextMaintStatus === 'warn' ? 'warn' : '';
  const nextIcon = eq.nextMaintStatus === 'err'
    ? ICONS.alert
    : ICONS.calendar2;

  const pillsHTML = eq.status.map(s =>
    `<div class="pill ${s.type}"><div class="pill-dot"></div>${s.label}</div>`
  ).join('');

  const statsHTML = eq.stats.map(s =>
    `<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-val ${s.type}">${s.val}</div></div>`
  ).join('');

  const detailsHTML = eq.details.map(d => {
    const cls = d.mono ? 'mono' : d.warn ? 'warn' : d.err ? 'err' : '';
    return `<div class="info-row">
      <div class="info-key">${d.key}</div>
      <div class="info-val ${cls}">${d.val}</div>
    </div>`;
  }).join('');

  const maintHTML = eq.maintenance.map(m =>
    `<div class="tl-item">
      <div class="tl-dot ${m.status}"></div>
      <div class="tl-body">
        <div class="tl-date">${m.date}</div>
        <div class="tl-title">${m.title}<span class="tl-type ${m.type}">${m.type}</span></div>
        <div class="tl-desc">${m.desc}</div>
      </div>
    </div>`
  ).join('');

  return `
  <div class="hero">
    <div class="hero-eyebrow">Ekipman Detayı</div>
    <div class="hero-main">
      <div class="equip-avatar" style="background:${eq.avatarBg}; font-size:26px;">${eq.emoji}</div>
      <div>
        <div class="hero-name">${eq.name}</div>
        <div class="hero-sub">${eq.model} &nbsp;·&nbsp; ${eq.location}</div>
        <div class="hero-id">${icon(ICONS.barcode,12)} ${eq.rfid}</div>
      </div>
    </div>
    <div class="pills">${pillsHTML}</div>
  </div>

  <div class="stat-row">${statsHTML}</div>

  <div class="next-banner ${nextClass}">
    ${icon(nextIcon, 20)}
    <div>
      <div class="next-banner-label">Sonraki bakım</div>
      <div class="next-banner-date">${eq.nextMaint}</div>
    </div>
  </div>

  <div class="section" style="animation-delay:0.1s">
    <div class="section-header">Ekipman bilgileri</div>
    <div class="info-card">${detailsHTML}</div>
  </div>

  <div class="section" style="animation-delay:0.16s">
    <div class="section-header">Bakım geçmişi</div>
    <div class="timeline">${maintHTML}</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="shareEquipment()">
      ${icon(ICONS.share)} Paylaş
    </button>
    <button class="btn btn-secondary" onclick="window.history.back()">
      Geri
    </button>
  </div>`;
}

function renderNotFound(id) {
  return `<div class="not-found">
    ${icon(ICONS.alert, 48)}
    <h2>Ekipman bulunamadı</h2>
    <p>ID: <code style="color:var(--accent2)">${id || '—'}</code><br>Bu etiket sisteme kayıtlı değil.</p>
  </div>`;
}

function renderNoId() {
  return `<div class="not-found">
    ${icon(ICONS.wifi, 48)}
    <h2>Ekipman seçilmedi</h2>
    <p>NFC etiketi okutun ya da URL'ye<br><code style="color:var(--accent2)">?id=ekipman_adi</code> ekleyin.</p>
  </div>`;
}

function shareEquipment() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert('Link kopyalandı!'));
  }
}

function showBadge(text) {
  const badge = document.getElementById('readBadge');
  const badgeText = document.getElementById('readBadgeText');
  badge.style.display = 'flex';
  badgeText.textContent = text;
}

function startNFCScan() {
  if (!('NDEFReader' in window)) return;

  const root = document.getElementById('root');

  // Eğer zaten bir ekipman gösteriliyorsa taramayı başlatma
  if (getParam('id')) return;

  // Bekleme ekranı göster
  root.innerHTML = `
    <div class="not-found" id="nfcWait">
      <div style="width:64px;height:64px;border-radius:50%;background:rgba(59,130,246,0.1);
        border:1px solid rgba(59,130,246,0.25);display:flex;align-items:center;
        justify-content:center;margin-bottom:20px;position:relative;" id="nfcPulse">
        ${icon(ICONS.wifi, 28)}
        <div style="position:absolute;inset:-8px;border-radius:50%;
          border:2px solid rgba(59,130,246,0.3);animation:pulse2 1.4s ease-out infinite;"></div>
      </div>
      <h2>NFC Bekleniyor</h2>
      <p style="margin-top:8px;">Telefonu ekipman etiketine<br>yaklaştır</p>
    </div>
    <style>
      @keyframes pulse2 {
        0% { transform:scale(1); opacity:0.7; }
        100% { transform:scale(1.8); opacity:0; }
      }
    </style>`;

  showBadge('NFC hazır');

  const ndef = new NDEFReader();
  ndef.scan()
    .then(() => {
      ndef.onreading = (event) => {
        const decoder = new TextDecoder();
        let foundId = null;

        for (const record of event.message.records) {
          // Text record — direkt ID
          if (record.recordType === 'text') {
            const text = decoder.decode(record.data).trim();
            // Eğer URL ise parametreyi çek
            try {
              const url = new URL(text);
              foundId = url.searchParams.get('id') || text;
            } catch {
              foundId = text;
            }
            break;
          }
          // URL record
          if (record.recordType === 'url') {
            const url = decoder.decode(record.data).trim();
            try {
              foundId = new URL(url).searchParams.get('id') || url;
            } catch {
              foundId = url;
            }
            break;
          }
        }

        if (foundId && EQUIPMENT[foundId]) {
          showBadge('NFC ile okundu ✓');
          root.innerHTML = renderEquipment(EQUIPMENT[foundId]);
          document.title = EQUIPMENT[foundId].name + ' — Ekipman';
        } else {
          root.innerHTML = `
            <div class="not-found">
              ${icon(ICONS.alert, 48)}
              <h2>Etiket tanınmadı</h2>
              <p>Okunan değer: <code style="color:var(--accent2)">${foundId || '—'}</code><br>
              Bu ID sisteme kayıtlı değil.</p>
              <button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;
                border-radius:10px;background:var(--accent);color:#fff;border:none;
                font-size:14px;cursor:pointer;">Tekrar dene</button>
            </div>`;
        }
      };

      ndef.onreadingerror = () => {
        showBadge('Okuma hatası');
      };
    })
    .catch((err) => {
      // İzin reddedildi veya desteklenmiyor
      root.innerHTML = `
        <div class="not-found">
          ${icon(ICONS.alert, 48)}
          <h2>NFC izni gerekli</h2>
          <p>Chrome'un NFC iznine izin verin:<br>
          Adres çubuğu → Kilit ikonu →<br>Site ayarları → NFC → İzin ver</p>
          <button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;
            border-radius:10px;background:var(--accent);color:#fff;border:none;
            font-size:14px;cursor:pointer;">Tekrar dene</button>
        </div>`;
      console.error('NFC error:', err);
    });
}

function init() {
  const id = getParam('id');
  const root = document.getElementById('root');

  // URL'de ?id= varsa direkt göster (NFC Tools URL modunda)
  if (id) {
    const eq = EQUIPMENT[id];
    if (!eq) {
      root.innerHTML = renderNotFound(id);
      return;
    }
    root.innerHTML = renderEquipment(eq);
    document.title = eq.name + ' — Ekipman';
    showBadge('Yüklendi');
    return;
  }

  // id yoksa NFC buton ekranı göster
  if ('NDEFReader' in window) {
    root.innerHTML = `
      <div class="not-found">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(59,130,246,0.1);
          border:1px solid rgba(59,130,246,0.25);display:flex;align-items:center;
          justify-content:center;margin-bottom:20px;">
          ${icon(ICONS.wifi, 32)}
        </div>
        <h2>Ekipman Okuyucu</h2>
        <p style="margin-top:8px;margin-bottom:24px;">Butona bas, ardından telefonu<br>NFC etiketine yaklaştır</p>
        <button onclick="startNFCScan()" style="padding:14px 32px;
          border-radius:12px;background:var(--accent);color:#fff;border:none;
          font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;
          display:flex;align-items:center;gap:8px;margin:0 auto;">
          ${icon(ICONS.wifi, 18)} NFC Tara
        </button>
      </div>`;
  } else {
    root.innerHTML = renderNoId();
  }
}

init();
</script>
</body>
</html>
